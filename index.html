<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>"موشنگ"اتوماسیون کلینیک</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="form-wrapper">
        <div class="header-section">
            <div class="logo-container">
                <i class="fas fa-heartbeat"></i>
            </div>
            <h1>درخواست اطلاعات بیمار</h1>
            <p class="subtitle">لطفاً اطلاعات خود را با دقت وارد کنید</p>
        </div>

        <form id="clinic-form" class="form-container">
            <!-- Personal Information Section -->
            <div class="form-section">
                <h3 class="section-title">
                    <i class="fas fa-user"></i>
                    اطلاعات اصلی
                </h3>

                <div class="form-row">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-user-circle"></i>
                            <input type="text" id="first-name" name="firstName" placeholder="نام" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-user-circle"></i>
                            <input type="text" id="last-name" name="lastName" placeholder="نام خانوادگی" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="national-id" name="nationalId" placeholder="کد ملی" required inputmode="numeric" pattern="[0-9]*">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-birthday-cake"></i>
                            <input type="number" id="age" name="age" placeholder="سن شما (به عدد)" required min="15" max="100">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" name="phone" placeholder="شماره تماس (مثال: 0912...)" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <textarea id="address" name="address" placeholder="آدرس منزل" rows="2" style="width: 100%; border: none; background: transparent; padding: 12px; outline: none; font-family: inherit;" required></textarea>
                    </div>
                </div>
            </div>

            <!-- Health Information Section -->
            <div class="form-section">
                <h3 class="section-title">
                    <i class="fas fa-stethoscope"></i>
                    اطلاعات پزشکی
                </h3>

                <div class="form-group">
                    <div class="select-wrapper">
                        <select id="smoker" name="smoker" required>
                            <option value="" disabled selected>سیگار مصرف میکنید؟</option>
                            <option value="yes">بله</option>
                            <option value="no">خیر</option>
                        </select>
                        <i class="fas fa-chevron-down border-none"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="select-wrapper">
                        <select id="alcohol" name="alcohol" required>
                            <option value="" disabled selected>الکل مصرف میکنید؟</option>
                            <option value="yes">بله</option>
                            <option value="no">خیر</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="select-wrapper">
                        <select id="drugs" name="drugs" required>
                            <option value="" disabled selected>مواد مخدر مصرف میکنید؟</option>
                            <option value="yes">بله</option>
                            <option value="no">خیر</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="select-wrapper">
                        <select id="diabetes" name="diabetes" required>
                            <option value="" disabled selected>آیا دیابت دارید؟</option>
                            <option value="yes">بله</option>
                            <option value="no">خیر</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-pills"></i>
                        <textarea id="medications" name="medications" placeholder="توضیح داروهای مصرفی (در صورت عدم مصرف بنویسید خیر)" rows="2" style="width: 100%; border: none; background: transparent; padding: 12px; outline: none; font-family: inherit;" required></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-allergies text-red-400"></i>
                        <textarea id="allergies" name="allergies" placeholder="حساسیت دارویی یا غذایی خاصی دارید؟ (اگر نه، بنویسید خیر)" rows="2" style="width: 100%; border: none; background: transparent; padding: 12px; outline: none; font-family: inherit;" required></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-procedures text-indigo-400"></i>
                        <textarea id="surgeries" name="surgeries" placeholder="سابقه عمل جراحی یا بیماری خاصی (خفیف یا حاد) دارید؟ (اگر نه، بنویسید خیر)" rows="2" style="width: 100%; border: none; background: transparent; padding: 12px; outline: none; font-family: inherit;" required></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" disabled title="سرور هنوز متصل نیست">
                <i class="fas fa-check"></i>
                ثبت اطلاعات
            </button>

            <div class="submit-info">
                ⚠️ برای شروع تست، دکمه "🚀 شروع تست محلی" را فشار دهید.
            </div>
        </form>

        <div class="test-panel" style="display: none;">
            <div class="test-header">
                🧪 <strong>پنل تست توسعه‌دهندگان</strong>
            </div>
            <div class="test-content">
                <p>شناسه تست: <code id="test-user-id">test_user_001</code></p>
                <button type="button" class="test-btn" onclick="startTestMode()">
                    🚀 شروع تست محلی
                </button>
                <button type="button" class="test-btn reset-btn" onclick="resetTestData()">
                    🔄 حذف داده‌های تست
                </button>
            </div>
        </div>

        <div class="success-message" id="success-message">
            <i class="fas fa-check-circle"></i>
            <p>اطلاعات شما با موفقیت ثبت شد</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
    </div>

    <script src="script.js"></script>
</body>
</html>
